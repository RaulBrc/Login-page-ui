<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <main class="container">
        <form>
            <h1>Login </h1>
            <div class="input-box">
                <input id="username" placeholder="user" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input id="password" placeholder="password" type="password">
                 <i id="icon" class="fa-solid fa-eye" onclick="showpassword()"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Remember password
                </label>
                <a href="#">Forgive password</a>
            </div>

            <button onclick="LoginValidation()" type="button" class="login">Login</button>
            <p id="error";"></p>

            <div class="register-link">
                <p>Haven't signed? <a href="#">Sign In</a></p>
            </div>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
